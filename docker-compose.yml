version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - orvanta-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/orvantahealth
      # Add other environment variables from .env if needed
      # (Cloudinary, JWT_SECRET, etc.)
    depends_on:
      - mongodb
    networks:
      - orvanta-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - orvanta-network

networks:
  orvanta-network:
    driver: bridge

volumes:
  mongodb_data:
